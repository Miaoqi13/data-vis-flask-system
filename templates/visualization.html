<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据可视化 - 数据分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<div class="topbar">
    📊 数据分析平台
    <div class="ms-auto d-flex align-items-center gap-3">
        <span class="text-muted" style="font-size: 14px;">👤 {{ session.username }}</span>
        <a href="/history" class="btn btn-sm btn-outline-secondary">历史记录</a>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">退出登录</a>
    </div>
</div>

<div class="sidebar">
    <div><a href="/main" class="text-decoration-none">📁 数据预览</a></div>
    <div><a href="/preview" class="text-decoration-none">🧹 数据清洗</a></div>
    {% if session.get('cleaned') %}
    <div><a href="/analyze" class="text-decoration-none">📊 数据分析</a></div>
    <div><a href="/visualization" class="text-decoration-none">📈 可视化</a></div>
    {% else %}
    <div class="disabled" title="请先完成数据清洗">📊 数据分析</div>
    <div class="disabled" title="请先完成数据清洗">📈 可视化</div>
    {% endif %}
    <div><a href="/export" class="text-decoration-none">⬇ 导出数据</a></div>
    <hr style="margin: 20px 0; border-color: #e5e7eb;">
    <div><a href="/logout" class="text-decoration-none">🚪 退出登录</a></div>
</div>

<div class="content">
    <h3 class="mb-4">数据可视化</h3>

    {% if error %}
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
        {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}

    <div class="card">
        <h5>创建图表</h5>
        <form method="post" action="/visualize">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">X轴字段</label>
                    <select class="form-select" name="x">
                        {% for col in data.columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Y轴字段</label>
                    <select class="form-select" name="y">
                        {% for col in data.columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">图表类型</label>
                    <select class="form-select" name="chart_type">
                        <option value="bar">柱状图</option>
                        <option value="line">折线图</option>
                        <option value="pie">饼图</option>
                        <option value="scatter">散点图</option>
                        <option value="box">箱线图</option>
                    </select>
                </div>
            </div>
            <div class="text-end mt-3">
                <button class="btn btn-primary">生成图表</button>
            </div>
        </form>
    </div>

    {% if chart_path %}
    <div class="card">
        <h5>图表结果</h5>
        <div class="text-center">
            <img src="{{ url_for('static', filename=chart_path) }}" class="img-fluid" alt="生成的图表">
        </div>
    </div>
    {% endif %}
</div>

</body>
</html>
