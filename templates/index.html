<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据分析平台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .container-box {
            max-width: 600px;
            margin: 120px auto;
            padding: 0 20px;
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .sub {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
        }
        
        .upload-icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 24px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<!-- 顶栏 -->
<div class="topbar">
    📊 数据分析平台
</div>

<!-- 主内容 -->
<div class="container-box">

    <div class="card">
        <div class="upload-icon">📁</div>
        <div class="title">上传数据文件</div>
        <div class="sub">支持 CSV / Excel 文件上传，自动解析并进入数据预览</div>

        <form action="/upload" method="post" enctype="multipart/form-data">

            <input class="form-control mb-3"
                   type="file"
                   name="file"
                   accept=".csv,.xlsx"
                   required>

            <button class="btn btn-primary w-100 py-2">
                ⬆️ 上传并开始分析
            </button>

        </form>

    </div>

</div>

</body>
</html>
