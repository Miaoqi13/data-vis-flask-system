<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>登录 - 数据分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .container-box {
            max-width: 420px;
            margin: 100px auto;
            padding: 0 20px;
        }
        
        .auth-icon {
            font-size: 56px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
            text-align: center;
        }
        
        .sub {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 15px;
            text-align: center;
        }
        
        .form-control {
            padding: 12px 16px;
            font-size: 15px;
        }
        
        .btn-primary {
            padding: 12px 24px;
            font-size: 15px;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="topbar">
    📊 数据分析平台
</div>

<div class="container-box">
    <div class="card">
        <div class="auth-icon">🔐</div>
        <div class="title">用户登录</div>
        <div class="sub">登录您的账户以继续</div>

        {% if error %}
        <div class="alert alert-warning mb-3">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success mb-3">{{ success }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-control" required autofocus placeholder="请输入用户名">
            </div>
            
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-control" required placeholder="请输入密码">
            </div>

            <button type="submit" class="btn btn-primary w-100">
                登录
            </button>
        </form>

        <div class="auth-links">
            还没有账户？<a href="/register">立即注册</a>
        </div>
    </div>
</div>

</body>
</html>
