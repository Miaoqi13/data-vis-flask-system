<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>历史数据集 - 数据分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; }
        .container-box { max-width: 1000px; margin: 40px auto; }
        .card { border-radius: 14px; }
    </style>
</head>
<body>
<div class="container-box">
    <div class="card p-4">
        <h2 class="mb-3">📚 历史数据集</h2>
        <table class="table table-hover">
            <thead class="table-light">
                <tr><th>ID</th><th>文件名</th><th>上传时间</th><th>行数</th><th>列数</th><th>操作</th></tr>
            </thead>
            <tbody>
                {% for ds in datasets %}
                <tr>
                    <td>{{ ds.id }}</td>
                    <td>{{ ds.filename }}</td>
                    <td>{{ ds.upload_time }}</td>
                    <td>{{ ds.rows }}</td>
                    <td>{{ ds.cols }}</td>
                    <td><a href="/load_history/{{ ds.id }}" class="btn btn-sm btn-primary">加载</a></td>
                </tr>
                {% else %}
                <tr><td colspan="6" class="text-center">暂无历史数据，请先上传文件</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary mt-3">返回上传首页</a>
    </div>
</div>
</body>
</html>
