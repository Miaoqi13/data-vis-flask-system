<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>数据分析平台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6fb;
            color: #1f2937;
            font-family: "Segoe UI", sans-serif;
        }

        /* 顶栏 */
        .topbar {
            height: 60px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: bold;
            font-size: 18px;
        }

        /* 左侧栏 */
        .sidebar {
            width: 220px;
            background: white;
            position: fixed;
            top: 60px;
            bottom: 0;
            border-right: 1px solid #e5e7eb;
            padding: 20px;
        }

        .sidebar div {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #4b5563;
        }

        .sidebar div:hover {
            background: #eef2ff;
            color: #1d4ed8;
        }

        /* 主内容 */
        .content {
            margin-left: 240px;
            padding: 20px;
        }

        /* 卡片 */
        .card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* 数字 */
        .stat {
            font-size: 28px;
            font-weight: bold;
            color: #2563eb;
        }

        /* 标签 */
        .badge {
            margin: 3px;
        }

        table {
            font-size: 14px;
        }
    </style>
</head>

<body>

<!-- 顶栏 -->
<div class="topbar">
    📊 数据分析平台
    <a href="/history" class="ms-auto btn btn-sm btn-outline-secondary" style="margin-left: auto;">历史记录</a>
</div>

<!-- 左侧导航 -->
<div class="sidebar">
    <div>📁 数据预览</div>
    <div>📊 数据分析</div>
    <div>📈 可视化</div>
    <div>⬇ 导出数据</div>
</div>

<!-- 主内容 -->
<div class="content">

    <h3 class="mb-4">数据概览</h3>

    <!-- 统计 -->
    <div class="row">

        <div class="col-md-6">
            <div class="card">
                <div>总行数</div>
                <div class="stat">{{ data.rows }}</div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div>总列数</div>
                <div class="stat">{{ data.cols }}</div>
            </div>
        </div>

    </div>

    <!-- 字段 -->
    <div class="card">
        <h5>字段列表</h5>
        <table class="table table-sm table-bordered">
            <thead class="table-light">
            <tr>
                <th>字段名</th>
            </tr>
        </thead>
        <tbody>
            {% for col in data.columns %}
            <tr>
                <td>{{ col }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>

    <!-- 表格 -->
    <div class="card">
        <h5>数据预览</h5>
        {{ data.head | safe }}
    </div>

    <!-- 下载 -->
    <div class="card text-center">
        <a class="btn btn-success px-4" href="/download/{{ filename }}">
            下载数据文件
        </a>
    </div>

</div>

</body>
</html>
